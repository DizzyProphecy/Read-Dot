<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOT READ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Merriweather:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --fg: #e0e0e0;
            --accent: #ffffff;
            --dim: #666666;
            --border: #2a2a2a;
            --font-serif: 'Merriweather', serif;
            --font-sans: 'Inter', sans-serif;
            --grid-color: var(--dim);
            --cell-size: 80px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-sans);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .pattern-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; opacity: 0.15;
            transition: background-image 0.3s ease;
        }

        /* Dots abbassati di molto */
        .pattern-dots {
            background-image: radial-gradient(var(--grid-color) 2px, transparent 2px);
            background-size: var(--cell-size) var(--cell-size);
            background-position: 0 calc(50% + 60px);
        }

        /* Righe abbassate leggermente */
        .pattern-lines {
            background-image: linear-gradient(0deg, transparent calc(var(--cell-size) - 2px), var(--grid-color) 2px);
            background-size: var(--cell-size) var(--cell-size);
            background-position: 0 calc(50% + 15px);
        }

        /* Quadretti abbassati leggermente */
        .pattern-graph {
            background-image: 
                linear-gradient(var(--grid-color) 2px, transparent 2px),
                linear-gradient(90deg, var(--grid-color) 2px, transparent 2px);
            background-size: var(--cell-size) var(--cell-size);
            background-position: 0 calc(50% + 15px), center;
        }

        #setup {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 20px; text-align: center; gap: 30px;
        }

        h1 {
            font-family: var(--font-sans); 
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 600;
            letter-spacing: -1px; 
            text-transform: uppercase; 
            position: relative;
            display: inline-block;
            padding-bottom: 6px;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 5px;
            background: var(--fg);
        }

        .file-btn {
            background: transparent; border: 1px solid var(--fg); color: var(--fg);
            padding: 12px 24px; font-family: var(--font-sans); font-size: 14px; font-weight: 600;
            cursor: pointer; position: relative; transition: all 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .file-btn:hover { background: var(--fg); color: var(--bg); }
        .file-btn input { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .settings-row { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; justify-content: center; }

        select {
            background: transparent; border: 1px solid var(--border); color: var(--dim);
            font-family: var(--font-sans); font-size: 11px; padding: 5px 8px;
            cursor: pointer; outline: none; text-transform: uppercase; letter-spacing: 1px;
        }
        select option { background: var(--bg); color: var(--fg); }
        select:focus { border-color: var(--fg); color: var(--fg); }

        #reader { display: none; flex-direction: column; height: 100%; position: relative; }

        .top-bar {
            padding: 8px 20px; display: flex; justify-content: space-between; align-items: center;
            font-family: var(--font-sans); font-size: 11px; color: var(--dim); border-bottom: 1px solid var(--border);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .word-stage { 
            flex: 1; position: relative; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }

        .word-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
            gap: 30px;
        }

        .context-word {
            font-family: var(--font-serif);
            font-size: clamp(14px, 2.5vw, 24px); 
            color: var(--dim); 
            transition: opacity 0.2s, filter 0.2s;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1;
        }

        #prev-word { text-align: right; justify-self: end; }
        #next-word { text-align: left; justify-self: start; }

        .context-word.blur-active { filter: blur(1.5px); opacity: 0.5; }
        .context-word:not(.blur-active) { opacity: 0.75; }

        #current-word {
            font-family: var(--font-serif);
            font-size: clamp(32px, 8vw, 96px); 
            font-weight: 700; 
            color: var(--accent);
            text-align: center; 
            line-height: 1; 
            white-space: nowrap;
            min-width: 1ch;
        }

        @keyframes popIn { 
            0% { transform: scale(0.9); opacity: 0; } 
            100% { transform: scale(1); opacity: 1; } 
        }
        .pop-anim { animation: popIn 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .controls {
            background: rgba(8, 8, 8, 0.9); border-top: 1px solid var(--border);
            padding: 16px; display: flex; flex-direction: column; gap: 16px; backdrop-filter: blur(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .control-row { display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; }

        .btn-icon {
            width: 44px; height: 44px; border: 1px solid var(--border); background: transparent;
            color: var(--fg); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-icon svg { width: 20px; height: 20px; fill: currentColor; }
        .btn-icon:hover { border-color: var(--fg); background: rgba(255,255,255,0.05); }
        .btn-icon.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }

        .speed-control { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 180px; max-width: 350px; }
        input[type="range"] { flex: 1; -webkit-appearance: none; height: 2px; background: var(--dim); outline: none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; background: var(--fg); cursor: pointer; border-radius: 0;
        }

        .presets { display: flex; gap: 8px; }
        .preset-btn {
            background: transparent; border: 1px solid var(--border); color: var(--dim);
            padding: 4px 8px; font-family: var(--font-sans); font-size: 11px; font-weight: 600; cursor: pointer;
        }
        .preset-btn.active { border-color: var(--fg); color: var(--fg); }

        .progress-container { height: 3px; width: 100%; background: var(--bg); position: relative; }
        .progress-fill {
            height: 100%; background: repeating-linear-gradient(90deg, var(--fg), var(--fg) 2px, transparent 2px, transparent 4px);
            width: 0%; transition: width 0.1s linear;
        }

        .page-indicator {
            position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
            font-family: var(--font-sans); font-size: 11px; color: var(--dim);
            background: rgba(8,8,8,0.8); padding: 4px 10px; border: 1px solid var(--border);
            transition: opacity 0.3s ease; pointer-events: none;
        }
        .page-indicator.hidden { opacity: 0; }

        #orientation-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 999; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; gap: 20px;
        }
        .rotate-icon { width: 60px; height: 60px; fill: var(--fg); animation: rotate 2s infinite ease-in-out; }
        @keyframes rotate { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } }
        @media (orientation: portrait) { #orientation-warning.active { display: flex; } }
        @media (max-width: 600px) {
            .controls { padding: 12px; gap: 12px; }
            .speed-control { order: -1; width: 100%; margin-bottom: 8px; }
            .page-indicator { bottom: 150px; }
            .word-container { gap: 15px; padding: 0 10px; }
        }

        body.fullscreen-mode .top-bar,
        body.fullscreen-mode .controls,
        body.fullscreen-mode .page-indicator { opacity: 0; pointer-events: none; transform: translateY(10px); }
    </style>
</head>
<body>

    <div class="pattern-grid pattern-dots" id="bg-pattern"></div>

    <div id="orientation-warning">
        <svg class="rotate-icon" viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
        <p style="font-family: var(--font-sans); font-weight: 600;" data-i18n="rotateDevice">ROTATE DEVICE</p>
    </div>

    <div id="setup">
        <h1>DOT READ</h1>
        
        <button class="file-btn">
            <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
            <span data-i18n="loadFile">LOAD FILE</span>
            <input type="file" id="file-input" accept=".epub,.pdf">
        </button>

        <div class="settings-row">
            <select id="lang-setup">
                <option value="en" selected>ENGLISH</option>
                <option value="it">ITALIANO</option>
                <option value="de">DEUTSCH</option>
                <option value="fr">FRANÇAIS</option>
                <option value="es">ESPAÑOL</option>
            </select>

            <select id="bg-selector">
                <option value="dots">DOTS</option>
                <option value="lines">LINES</option>
                <option value="graph">GRID</option>
            </select>
        </div>
    </div>

    <div id="reader">
        <div class="progress-container"><div class="progress-fill" id="progress-bar"></div></div>
        <div class="top-bar" id="top-bar">
            <span id="file-name">DOT READ</span>
            <div style="display:flex;align-items:center;gap:10px;">
                <span id="word-count">0 / 0</span>
                <select id="lang-reader">
                    <option value="en" selected>EN</option>
                    <option value="it">IT</option>
                    <option value="de">DE</option>
                    <option value="fr">FR</option>
                    <option value="es">ES</option>
                </select>
                <select id="bg-selector-reader">
                    <option value="dots">DOTS</option>
                    <option value="lines">LINES</option>
                    <option value="graph">GRID</option>
                </select>
            </div>
        </div>
        
        <div class="page-indicator" id="page-indicator">PAGE 1</div>

        <div class="word-stage" id="word-stage">
            <div class="word-container">
                <div class="context-word blur-active" id="prev-word"></div>
                <div id="current-word">READY</div>
                <div class="context-word blur-active" id="next-word"></div>
            </div>
        </div>

        <div class="controls" id="controls-panel">
            <div class="control-row">
                <div class="speed-control">
                    <span style="font-family: var(--font-sans); font-size: 11px; font-weight: 600;" data-i18n="spdLabel">SPD</span>
                    <input type="range" id="speed-slider" min="50" max="800" value="300" step="10">
                    <span id="speed-display" style="font-family: var(--font-sans); font-size: 11px; min-width: 35px;">300</span>
                </div>
            </div>
            <div class="control-row">
                <div class="presets">
                    <button class="preset-btn" data-speed="400" data-i18n="presetSlow">SLOW</button>
                    <button class="preset-btn active" data-speed="300" data-i18n="presetMed">MED</button>
                    <button class="preset-btn" data-speed="180" data-i18n="presetFast">FAST</button>
                    <button class="preset-btn" data-speed="100" data-i18n="presetMax">MAX</button>
                </div>
            </div>
            <div class="control-row">
                <button class="btn-icon" id="btn-prev-page" title="Previous Page">
                    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </button>
                <button class="btn-icon" id="btn-play" title="Play/Pause">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="btn-icon" id="btn-next-page" title="Next Page">
                    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                </button>
                <button class="btn-icon" id="btn-reset" title="Reset">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 10h7V3l-2.35 3.35z"/></svg>
                </button>
                <button class="btn-icon active" id="btn-blur" title="Toggle Blur">
                    <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                </button>
                <button class="btn-icon active" id="btn-anim" title="Toggle Animation">
                    <svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
                </button>
                <button class="btn-icon" id="btn-fullscreen" title="Fullscreen Mode">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const translations = {
            en: { rotateDevice: "ROTATE DEVICE", loadFile: "LOAD FILE", spdLabel: "SPD", presetSlow: "SLOW", presetMed: "MED", presetFast: "FAST", presetMax: "MAX", ready: "READY", errorFormat: "Unsupported format. Use EPUB or PDF.", errorEmpty: "No text found in file.", errorGeneric: "Error: ", wordCount: "{current} / {total}", pageLabel: "PAGE {page}" },
            it: { rotateDevice: "RUOTA IL DISPOSITIVO", loadFile: "CARICA FILE", spdLabel: "VEL", presetSlow: "LENTO", presetMed: "MEDIO", presetFast: "VELOCE", presetMax: "MAX", ready: "PRONTO", errorFormat: "Formato non supportato. Usa EPUB o PDF.", errorEmpty: "Nessun testo trovato nel file.", errorGeneric: "Errore ", wordCount: "{current} / {total}", pageLabel: "PAGINA {page}" },
            de: { rotateDevice: "GERÄT DREHEN", loadFile: "DATEI LADEN", spdLabel: "GESCHW", presetSlow: "LANGSAM", presetMed: "MITTEL", presetFast: "SCHNELL", presetMax: "MAX", ready: "BEREIT", errorFormat: "Nicht unterstütztes Format. Verwenden Sie EPUB oder PDF.", errorEmpty: "Kein Text in der Datei gefunden.", errorGeneric: "Fehler: ", wordCount: "{current} / {total}", pageLabel: "SEITE {page}" },
            fr: { rotateDevice: "TOURNEZ L'APPAREIL", loadFile: "CHARGER FICHIER", spdLabel: "VIT", presetSlow: "LENT", presetMed: "MOYEN", presetFast: "RAPIDE", presetMax: "MAX", ready: "PRÊT", errorFormat: "Format non pris en charge. Utilisez EPUB ou PDF.", errorEmpty: "Aucun texte trouvé dans le fichier.", errorGeneric: "Erreur : ", wordCount: "{current} / {total}", pageLabel: "PAGE {page}" },
            es: { rotateDevice: "GIRA EL DISPOSITIVO", loadFile: "CARGAR ARCHIVO", spdLabel: "VEL", presetSlow: "LENTO", presetMed: "MEDIO", presetFast: "RÁPIDO", presetMax: "MÁX", ready: "LISTO", errorFormat: "Formato no compatible. Usa EPUB o PDF.", errorEmpty: "No se encontró texto en el archivo.", errorGeneric: "Error: ", wordCount: "{current} / {total}", pageLabel: "PÁGINA {page}" }
        };

        let currentLang = 'en';
        let currentPage = 1;
        let totalPages = 1;
        let pageWordIndices = [0];
        let isFullscreen = false;
        let pageIndicatorTimeout = null;

        const dom = {
            setup: document.getElementById('setup'), reader: document.getElementById('reader'),
            fileInput: document.getElementById('file-input'), fileName: document.getElementById('file-name'),
            wordCount: document.getElementById('word-count'), currentWord: document.getElementById('current-word'),
            prevWord: document.getElementById('prev-word'), nextWord: document.getElementById('next-word'),
            progressBar: document.getElementById('progress-bar'), btnPlay: document.getElementById('btn-play'),
            iconPlay: document.getElementById('icon-play'), iconPause: document.getElementById('icon-pause'),
            btnReset: document.getElementById('btn-reset'), btnBlur: document.getElementById('btn-blur'),
            btnAnim: document.getElementById('btn-anim'), btnPrevPage: document.getElementById('btn-prev-page'),
            btnNextPage: document.getElementById('btn-next-page'), btnFullscreen: document.getElementById('btn-fullscreen'),
            speedSlider: document.getElementById('speed-slider'), speedDisplay: document.getElementById('speed-display'),
            presets: document.querySelectorAll('.preset-btn'), orientationWarning: document.getElementById('orientation-warning'),
            pageIndicator: document.getElementById('page-indicator'), bgPattern: document.getElementById('bg-pattern')
        };

        function setBgPattern(type) {
            dom.bgPattern.className = 'pattern-grid';
            dom.bgPattern.classList.add(`pattern-${type}`);
            document.getElementById('bg-selector').value = type;
            document.getElementById('bg-selector-reader').value = type;
        }

        document.getElementById('bg-selector').addEventListener('change', e => setBgPattern(e.target.value));
        document.getElementById('bg-selector-reader').addEventListener('change', e => setBgPattern(e.target.value));

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });
            if (state.words.length === 0) dom.currentWord.textContent = t.ready;
            document.getElementById('lang-setup').value = lang;
            document.getElementById('lang-reader').value = lang;
            updateWordCountUI();
            updatePageIndicator();
        }

        function updateWordCountUI() {
            const total = state.words.length;
            if (total === 0) return;
            const t = translations[currentLang];
            dom.wordCount.textContent = t.wordCount.replace('{current}', state.index + 1).replace('{total}', total);
        }

        function updatePageIndicator(forceShow = false) {
            const t = translations[currentLang];
            dom.pageIndicator.textContent = t.pageLabel.replace('{page}', currentPage);
            if (forceShow || !isFullscreen) {
                dom.pageIndicator.classList.remove('hidden');
                clearTimeout(pageIndicatorTimeout);
                pageIndicatorTimeout = setTimeout(() => { if (!isFullscreen) dom.pageIndicator.classList.add('hidden'); }, 2000);
            } else { dom.pageIndicator.classList.add('hidden'); }
        }

        function calculatePages(words) {
            pageWordIndices = [0];
            for (let i = 300; i < words.length; i += 300) pageWordIndices.push(i);
            totalPages = pageWordIndices.length;
            currentPage = 1;
        }

        function goToPage(pageNum) {
            if (pageNum < 1 || pageNum > totalPages) return;
            stopReading();
            currentPage = pageNum;
            state.index = pageWordIndices[pageNum - 1];
            updateUI();
            updatePageIndicator(true);
        }

        const state = { words: [], index: 0, isPlaying: false, speed: 300, timerId: null, blur: true, anim: true };

        function checkOrientation() {
            if (window.innerHeight > window.innerWidth) dom.orientationWarning.classList.add('active');
            else dom.orientationWarning.classList.remove('active');
        }
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', checkOrientation);
        checkOrientation();

        async function extractEpub(file) {
            const zip = await JSZip.loadAsync(file);
            let text = '';
            const files = Object.keys(zip.files).filter(n => n.endsWith('.xhtml') || n.endsWith('.html'));
            for (const f of files) {
                const content = await zip.files[f].async('text');
                const div = document.createElement('div');
                div.innerHTML = content;
                text += div.textContent + ' ';
            }
            return cleanText(text);
        }

        async function extractPdf(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let text = '';
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(item => item.str).join(' ') + ' ';
            }
            return cleanText(text);
        }

        function cleanText(text) {
            return text.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/\s+/g, ' ').trim().split(' ').filter(w => w.length > 0 && !/^[\.\,\;\:\!\?]+$/.test(w));
        }

        dom.fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const t = translations[currentLang];
            try {
                let words = [];
                dom.fileName.textContent = file.name.substring(0, 15) + (file.name.length > 15 ? '...' : '');
                if (file.name.endsWith('.epub')) words = await extractEpub(file);
                else if (file.name.endsWith('.pdf')) words = await extractPdf(file);
                else { alert(t.errorFormat); return; }
                if (words.length === 0) throw new Error(t.errorEmpty);
                state.words = words;
                state.index = 0;
                calculatePages(words);
                dom.setup.style.display = 'none';
                dom.reader.style.display = 'flex';
                updateUI();
                updatePageIndicator(true);
            } catch (err) { console.error(err); alert(t.errorGeneric + err.message); }
        });

        function updateUI() {
            const total = state.words.length;
            if (total === 0) return;
            for (let i = pageWordIndices.length - 1; i >= 0; i--) {
                if (state.index >= pageWordIndices[i]) { currentPage = i + 1; break; }
            }
            dom.currentWord.textContent = state.words[state.index] || '';
            dom.prevWord.textContent = state.index > 0 ? state.words[state.index - 1] : '';
            dom.nextWord.textContent = state.index < total - 1 ? state.words[state.index + 1] : '';
            updateWordCountUI();
            updatePageIndicator();
            dom.progressBar.style.width = `${((state.index + 1) / total) * 100}%`;
            if (state.anim) {
                dom.currentWord.classList.remove('pop-anim');
                void dom.currentWord.offsetWidth;
                dom.currentWord.classList.add('pop-anim');
            }
        }

        function scheduleNext() {
            if (!state.isPlaying) return;
            state.timerId = setTimeout(() => {
                if (state.index < state.words.length - 1) { state.index++; updateUI(); scheduleNext(); }
                else stopReading();
            }, state.speed);
        }

        function startReading() {
            if (state.isPlaying || state.words.length === 0) return;
            state.isPlaying = true;
            dom.iconPlay.style.display = 'none'; dom.iconPause.style.display = 'block';
            dom.btnPlay.classList.add('active'); scheduleNext();
        }

        function stopReading() {
            state.isPlaying = false;
            if (state.timerId) { clearTimeout(state.timerId); state.timerId = null; }
            dom.iconPlay.style.display = 'block'; dom.iconPause.style.display = 'none';
            dom.btnPlay.classList.remove('active');
        }

        dom.btnPlay.addEventListener('click', () => state.isPlaying ? stopReading() : startReading());
        dom.btnReset.addEventListener('click', () => { stopReading(); state.index = 0; currentPage = 1; updateUI(); updatePageIndicator(true); });
        dom.btnPrevPage.addEventListener('click', () => goToPage(currentPage - 1));
        dom.btnNextPage.addEventListener('click', () => goToPage(currentPage + 1));
        dom.btnFullscreen.addEventListener('click', () => {
            isFullscreen = !isFullscreen;
            document.body.classList.toggle('fullscreen-mode', isFullscreen);
            dom.btnFullscreen.classList.toggle('active', isFullscreen);
            if (isFullscreen) dom.pageIndicator.classList.add('hidden'); else updatePageIndicator(true);
        });
        dom.btnBlur.addEventListener('click', () => {
            state.blur = !state.blur; dom.btnBlur.classList.toggle('active', state.blur);
            dom.prevWord.classList.toggle('blur-active', state.blur); dom.nextWord.classList.toggle('blur-active', state.blur);
        });
        dom.btnAnim.addEventListener('click', () => { state.anim = !state.anim; dom.btnAnim.classList.toggle('active', state.anim); });
        dom.speedSlider.addEventListener('input', (e) => {
            state.speed = parseInt(e.target.value); dom.speedDisplay.textContent = state.speed; updatePresetsUI();
            if (state.isPlaying) { clearTimeout(state.timerId); scheduleNext(); }
        });
        dom.presets.forEach(btn => btn.addEventListener('click', () => {
            state.speed = parseInt(btn.dataset.speed); dom.speedSlider.value = state.speed;
            dom.speedDisplay.textContent = state.speed; updatePresetsUI();
            if (state.isPlaying) { clearTimeout(state.timerId); scheduleNext(); }
        }));

        function updatePresetsUI() {
            dom.presets.forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.speed) === state.speed));
        }

        document.addEventListener('keydown', (e) => {
            if (dom.reader.style.display !== 'flex') return;
            if (e.code === 'Space') { e.preventDefault(); state.isPlaying ? stopReading() : startReading(); }
            else if (e.code === 'ArrowLeft') goToPage(currentPage - 1);
            else if (e.code === 'ArrowRight') goToPage(currentPage + 1);
            else if (e.code === 'KeyF') dom.btnFullscreen.click();
        });

        document.getElementById('word-stage').addEventListener('click', () => { if (state.words.length > 0) dom.btnFullscreen.click(); });
        document.getElementById('lang-setup').addEventListener('change', (e) => setLanguage(e.target.value));
        document.getElementById('lang-reader').addEventListener('change', (e) => setLanguage(e.target.value));

        setLanguage('en');
    </script>
</body>
</html>
